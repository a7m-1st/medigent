  # llama.cpp Server with GGUF quantized model for MedGemma
  llamacpp:
    # Switching to 'latest' to get Gemma 3 architecture support
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: medgemma-llamacpp
    ports:
      - "8080:8000"
    volumes:
      - ./models:/models
    command: >
      --host 0.0.0.0
      --port 8000
      --model /models/medgemma-4b-it-Q6_K.gguf
      --mmproj /models/mmproj-F16.gguf
      --ctx-size 16384
      --n-gpu-layers 99
      --threads 8
      --parallel 4
      --batch-size 512
      --ubatch-size 512
      --metrics
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - medgemma-network

  # Cloudflare Tunnel for llama.cpp API
  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflare-tunnel
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      - llamacpp
    networks:
      - medgemma-network
    environment:
      - TUNNEL_METRICS=0.0.0.0:45678

volumes:
  vllm-data:

networks:
  medgemma-network:
    driver: bridge