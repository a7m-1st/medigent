services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medgemma-app
    ports:
      - "8000:8000"  # Frontend (served by FastAPI)
    environment:
      - PYTHONPATH=/app
      - UV_COMPILE_BYTECODE=0
      - UV_LINK_MODE=copy
    # For development: mount backend code for hot-reload
    # volumes:
    #   - ./backend:/app
    #   - /app/.venv  # Preserve virtual environment
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
